spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://auth-server:8080
              predicates:
                - Path=/api/auth/**
              
            - id: resource-service
              uri: http://resource-service:8082
              predicates: 
                - Path=/api/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
