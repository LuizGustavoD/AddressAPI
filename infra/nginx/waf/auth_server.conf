SecRule REQUEST_URI "@beginsWith /api/auth/login" \
    "id:10001,\
    phase:1,\
    deny,\
    status:405,\
    log,\
    msg:'Method not allowed on login endpoint',\
    chain"
SecRule REQUEST_METHOD "!@rx ^POST$" ""

SecRule REQUEST_URI "@beginsWith /api/auth/register" \
    "id:10002,\
    phase:1,\
    deny,\
    status:405,\
    log,\
    msg:'Method not allowed on register endpoint',\
    chain"
SecRule REQUEST_METHOD "!@rx ^POST$" ""

SecRule REQUEST_URI "@beginsWith /api/auth/login" \
    "id:10003,\
    phase:2,\
    deny,\
    status:400,\
    log,\
    msg:'SQL Injection pattern detected in Auth Server request',\
    chain"
SecRule ARGS "@rx (?i)(union|select|insert|update|delete|drop|\'|--)" ""
